<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — CampusX Portal</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@600;700;800&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #6C63FF;
            --primary-dark: #4B44CC;
            --primary-light: #A29BFE;
            --dark: #0D1117;
            --dark2: #161B22;
            --dark3: #1C2128;
            --border: rgba(255, 255, 255, 0.08);
            --text: #E6EDF3;
            --text-muted: #8B949E;
            --text-dim: #656D76;
            --danger: #F85149;
            --success: #3FB950;
            --warning: #D29922;
            --radius: 12px;
        }

        body {
            background: var(--dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            color: var(--text);
            padding: 20px;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(108, 99, 255, 0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        .login-card {
            background: var(--dark2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 14px;
            background: rgba(248, 81, 73, 0.15);
            border: 1px solid rgba(248, 81, 73, 0.3);
            border-radius: 50px;
            font-size: 0.72rem;
            font-weight: 700;
            color: #F85149;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .login-logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .login-logo span {
            color: var(--primary);
        }

        .login-subtitle {
            font-size: 0.88rem;
            color: var(--text-muted);
            margin-bottom: 36px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 7px;
            letter-spacing: 0.3px;
        }

        .form-input {
            width: 100%;
            background: var(--dark3);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 16px;
            color: var(--text);
            font-size: 0.92rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: rgba(108, 99, 255, 0.5);
        }

        .form-input::placeholder {
            color: var(--text-dim);
        }

        .input-wrap {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
            pointer-events: none;
        }

        .input-wrap .form-input {
            padding-left: 40px;
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 10px;
            padding: 13px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            margin-top: 12px;
            transition: all 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(108, 99, 255, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-msg {
            background: rgba(248, 81, 73, 0.1);
            border: 1px solid rgba(248, 81, 73, 0.3);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.82rem;
            color: var(--danger);
            margin-top: 14px;
            display: none;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            font-size: 0.82rem;
            color: var(--text-dim);
            text-decoration: none;
        }

        .back-link:hover {
            color: var(--text-muted);
        }

        .hint-box {
            margin-top: 24px;
            padding: 12px 16px;
            background: rgba(108, 99, 255, 0.06);
            border: 1px solid rgba(108, 99, 255, 0.15);
            border-radius: 8px;
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        .hint-box strong {
            color: var(--primary-light);
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="admin-badge">🔐 Admin Portal</div>
        <div class="login-logo">Campus<span>X</span></div>
        <div class="login-subtitle">Sign in to access the admin control panel.</div>

        <form id="adminLoginForm" onsubmit="handleAdminLogin(event)">
            <div class="form-group">
                <label class="form-label">Username</label>
                <div class="input-wrap">
                    <span class="input-icon">👤</span>
                    <input type="text" class="form-input" id="adminUser" placeholder="admin" required
                        autocomplete="username">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-wrap">
                    <span class="input-icon">🔑</span>
                    <input type="password" class="form-input" id="adminPass" placeholder="••••••••" required
                        autocomplete="current-password">
                </div>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">Sign In to Admin Panel →</button>
            <div class="error-msg" id="errorMsg">❌ Invalid username or password.</div>
        </form>

        <div class="hint-box">
            Default credentials: <strong>admin</strong> / <strong>admin123</strong>
        </div>

        <a href="index.html" class="back-link">← Back to main site</a>
    </div>

    <script>
        // Redirect if already authenticated
        if (localStorage.getItem('adminAuth') === 'true') {
            window.location.href = 'admin-dashboard.html';
        }

        function handleAdminLogin(e) {
            e.preventDefault();
            const user = document.getElementById('adminUser').value.trim();
            const pass = document.getElementById('adminPass').value;
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('errorMsg');

            btn.textContent = 'Signing in…';
            btn.disabled = true;

            // Simulate a slight delay for UX
            setTimeout(() => {
                // Static admin credentials
                if (user === 'admin' && pass === 'admin123') {
                    localStorage.setItem('adminAuth', 'true');
                    localStorage.setItem('adminUser', 'admin');
                    window.location.href = 'admin-dashboard.html';
                } else {
                    err.style.display = 'block';
                    btn.textContent = 'Sign In to Admin Panel →';
                    btn.disabled = false;
                    document.getElementById('adminPass').value = '';
                }
            }, 600);
        }
    </script>
</body>

</html>
