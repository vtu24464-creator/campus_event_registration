# ── DataSource ────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/campusx?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Server ─────────────────────────────────────────────────────
server.port=8080

# ── Static Resources (serve frontend from resources/static/) ───
spring.web.resources.static-locations=classpath:/static/
spring.mvc.throw-exception-if-no-handler-found=false

# ── JWT ────────────────────────────────────────────────────────
# Copy the same secret from backend/.env file
jwt.secret=24de7a07b75cdc53789f8b079df4d21d265f3ec45424cb04b9adad8fc49cc4a4d8c2765417e859ebdd31b590f62533e400a5bef2827d55a398c36bbd1d66576e
# 7 days in milliseconds
jwt.expiration=604800000

# ── Logging ────────────────────────────────────────────────────
logging.level.com.campusx=DEBUG
logging.level.org.springframework.security=INFO
